<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Nakhon Sawan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Mali', sans-serif;
        }

        .navbar-brand img {
            height: 50px;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            font-size: 0.9em;
            color: #6c757d;
        }

        footer {
            background-color: #f8f9fa;
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">หน้าหลัก</a></li>
                        <li class="nav-item"><a class="nav-link" href="info.html">ข้อมูลท่องเที่ยวจังหวัด</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">ติดต่อเรา</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <section>
            <h2 class="text-center mb-4">ส่งข้อความถึงเรา</h2>
            <form action="/submit" method="POST" role="form" aria-label="แบบฟอร์มติดต่อ">
                <div class="mb-3">
                    <label for="fullname" class="form-label">ชื่อ-นามสกุล *</label>
                    <input type="text" id="fullname" name="fullname" class="form-control" required
                        aria-required="true" minlength="2" maxlength="100" aria-describedby="fullname-help">
                    <small id="fullname-help">กรุณากรอกชื่อและนามสกุลจริง</small>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">อีเมล *</label>
                    <input type="email" id="email" name="email" class="form-control" required aria-required="true"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" aria-describedby="email-help">
                    <small id="email-help">ตัวอย่าง: example@domain.com</small>
                </div>
                <div class="mb-3">
                    <label for="tel" class="form-label">เบอร์โทรศัพท์</label>
                    <input type="tel" id="tel" name="tel" class="form-control" pattern="[0-9]{10}"
                        aria-describedby="tel-help">
                    <small id="tel-help">กรอกหมายเลข 10 หลัก ไม่ต้องมีขีด เช่น 0812345678</small>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">ข้อความ *</label>
                    <textarea id="message" name="message" class="form-control" required aria-required="true"
                        minlength="10" rows="5" aria-describedby="message-help"></textarea>
                    <small id="message-help">กรุณากรอกข้อความอย่างน้อย 10 ตัวอักษร</small>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary" aria-label="ส่งข้อความ">ส่งข้อความ</button>
                </div>
            </form>
        </section>
    </main>

    <footer role="contentinfo">
        <div class="container">
            <p>&copy; จังหวัดนครสวรรค์ยินดีต้อนรับ หากติดต่อเรา <a href="mailto:66160011@go.buu.ac.th">66160011@go.buu.ac.th</a> สงวนลิขสิทธิ์.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
